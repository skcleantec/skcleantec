# 숨고 브릿지 데스크톱 — GitHub Releases (Setup.exe + ZIP)
# 트리거: 태그 soomgo-bridge-v* 푸시 또는 workflow_dispatch

name: Soomgo Bridge Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Semver (예: 2.0.0)'
        required: true
        default: '2.0.0'
  push:
    tags:
      - 'soomgo-bridge-v*'

permissions:
  contents: write

jobs:
  package:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $tag = '${{ github.ref_name }}'
          if ($tag -match '^soomgo-bridge-v(.+)$') {
            $v = $Matches[1]
          } else {
            $v = '${{ inputs.version }}'
            if (-not $v) { $v = '2.0.0' }
          }
          "version=$v" >> $env:GITHUB_OUTPUT
          Write-Host "Packaging version: $v"

      - name: Install Inno Setup
        run: choco install innosetup -y --no-progress

      - name: Build Setup.exe and ZIP
        shell: pwsh
        run: ./tools/soomgo-bridge/scripts/build-release.ps1 -Version ${{ steps.ver.outputs.version }}

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: soomgo-bridge-v${{ steps.ver.outputs.version }}
          name: Soomgo Bridge v${{ steps.ver.outputs.version }}
          body: |
            청소비서 숨고 연동 데스크톱 v${{ steps.ver.outputs.version }}

            **상담사 PC (권장):** `SoomgoBridge-Setup-*.exe` 더블클릭 → 설치 마법사 → 트레이 실행
            - 설치 중 매니페스트 URL 입력 (스테이징/운영 `/api/public/soomgo-bridge/manifest`)
            - CRM **업데이트**는 Setup `/SILENT` 자동 설치 지원

            **개발·수동:** `SoomgoBridge-*.zip` 압축 해제 후 `run-desktop.bat`

            Railway: `railway-env-*.txt` 의 `DOWNLOAD_URL`·`SHA256` → Setup.exe 기준
          files: |
            tools/soomgo-bridge/dist/SoomgoBridge-Setup-${{ steps.ver.outputs.version }}.exe
            tools/soomgo-bridge/dist/SoomgoBridge-${{ steps.ver.outputs.version }}.zip
            tools/soomgo-bridge/dist/railway-env-${{ steps.ver.outputs.version }}.txt
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
