services:
  db:
    image: postgres:16-alpine
    container_name: skcleanteck-db
    environment:
      POSTGRES_USER: skcleanteck
      POSTGRES_PASSWORD: skcleanteck
      POSTGRES_DB: skcleanteck
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U skcleanteck -d skcleanteck"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

volumes:
  pgdata:
