services:
  db:
    image: postgres:16-alpine
    container_name: skcleanteck-db
    environment:
      POSTGRES_USER: skcleanteck
      POSTGRES_PASSWORD: skcleanteck
      POSTGRES_DB: skcleanteck
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
